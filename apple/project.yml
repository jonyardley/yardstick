name: Daily
options:
  bundleIdPrefix: com.yardley
packages:
  Shared: { path: ./generated/Shared }
  App: { path: ./generated/App }
targets:
  Daily:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources: [Daily]
    dependencies:
      - package: Shared
      - package: App
    settings:
      base:
        PRODUCT_NAME: Daily
        SWIFT_VERSION: "5.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Ad-hoc local signing so headless xcodebuild (and CI, Task 9) works
        # without a signing identity. No App Sandbox / entitlements in this
        # dev phase — the embedded MCP server binds localhost directly;
        # sandbox + hardened runtime are a later-phase hardening item.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
    info:
      path: Daily/Info.plist
      properties:
        CFBundleDisplayName: Daily
        NSHumanReadableCopyright: ""
schemes:
  Daily:
    build:
      targets:
        Daily: all
    run:
      config: Debug
